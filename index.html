<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Sai Samiti — Live Darshan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon-deep:#2B0B10;
    --maroon-panel:#3D131A;
    --maroon-panel-2:#4A171F;
    --brass:#C9A227;
    --brass-soft:#E4C567;
    --marigold:#F0932B;
    --flame:#FF7A3D;
    --ivory:#F6ECDD;
    --ivory-dim:#D9C7B4;
    --sindoor:#B23A2E;
    --sindoor-glow:#E85C46;
    --border-soft:rgba(201,162,39,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #521A22 0%, transparent 55%),
      linear-gradient(180deg,var(--maroon-deep) 0%, #1E0709 100%);
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    color:var(--ivory);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .page{width:100%;max-width:620px;}

  /* ---------- Header mark ---------- */
  .mark{text-align:center;margin-bottom:22px;}
  .mark .om{
    font-family:'Cinzel',serif;
    font-size:13px;
    letter-spacing:0.35em;
    color:var(--brass-soft);
    text-transform:uppercase;
    opacity:0.85;
  }
  .mark h1{
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:clamp(26px,5vw,34px);
    margin:6px 0 4px;
    letter-spacing:0.02em;
    color:var(--ivory);
    text-shadow:0 0 24px rgba(240,147,43,0.25);
  }
  .mark p{
    margin:0;
    font-size:13px;
    color:var(--ivory-dim);
    letter-spacing:0.04em;
  }

  /* ---------- Arch frame (gopuram-style doorway around the player) ---------- */
  .arch-wrap{
    position:relative;
    padding:14px 14px 0;
    margin-top:26px;
  }
  .arch-frame{
    position:relative;
    border-radius:170px 170px 18px 18px;
    background:linear-gradient(180deg,var(--maroon-panel-2) 0%,var(--maroon-panel) 100%);
    border:1px solid var(--border-soft);
    padding:22px 22px 26px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .arch-frame::before{
    content:"";
    position:absolute;
    top:10px;left:10px;right:10px;
    height:calc(100% - 20px);
    border-radius:158px 158px 10px 10px;
    border:1px solid rgba(201,162,39,0.35);
    pointer-events:none;
  }
  .bell{
    position:absolute;
    top:-6px;
    width:20px;height:26px;
    background:linear-gradient(180deg,var(--brass-soft),var(--brass));
    border-radius:0 0 10px 10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    transform-origin:top center;
    transition:transform 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .bell.left{left:34px;}
  .bell.right{right:34px;}
  .bell.ring{transform:rotate(14deg);}
  .bell::after{
    content:"";
    position:absolute;left:50%;bottom:-4px;
    width:4px;height:4px;border-radius:50%;
    background:var(--brass);
    transform:translateX(-50%);
  }

  .player-shell{
    position:relative;
    border-radius:130px 130px 8px 8px;
    overflow:hidden;
    background:#140406;
    aspect-ratio:16/10;
    border:1px solid rgba(0,0,0,0.4);
  }
  .player-shell iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;
  }
  .placeholder{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;text-align:center;padding:20px;
  }
  .flame{
    width:14px;height:22px;
    background:radial-gradient(circle at 50% 80%, var(--flame) 0%, var(--marigold) 55%, transparent 75%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation:flicker 1.6s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{transform:scale(1) skewX(0deg);opacity:1;}
    30%{transform:scale(0.94,1.05) skewX(-2deg);opacity:0.92;}
    55%{transform:scale(1.06,0.96) skewX(2deg);opacity:1;}
    80%{transform:scale(0.98,1.02) skewX(-1deg);opacity:0.95;}
  }
  .placeholder p{margin:0;font-size:13px;color:var(--ivory-dim);max-width:280px;line-height:1.5;}
  .placeholder a{color:var(--brass-soft);}

  /* ---------- Status row ---------- */
  .status-row{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:18px;flex-wrap:wrap;
  }
  .pill{
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 14px;border-radius:999px;
    font-size:12.5px;letter-spacing:0.03em;font-weight:500;
    border:1px solid var(--border-soft);
    background:rgba(0,0,0,0.2);
    color:var(--ivory-dim);
  }
  .pill.live{
    color:var(--ivory);
    border-color:rgba(178,58,46,0.6);
    background:rgba(178,58,46,0.18);
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ivory-dim);}
  .pill.live .dot{
    background:var(--sindoor-glow);
    box-shadow:0 0 0 0 rgba(232,92,70,0.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(232,92,70,0.55);}
    70%{box-shadow:0 0 0 8px rgba(232,92,70,0);}
    100%{box-shadow:0 0 0 0 rgba(232,92,70,0);}
  }

  /* ---------- Bell button ---------- */
  .ring-btn{
    display:block;margin:20px auto 0;
    font-family:'Poppins',sans-serif;
    font-weight:500;font-size:13.5px;
    color:var(--maroon-deep);
    background:linear-gradient(180deg,var(--brass-soft),var(--brass));
    border:none;border-radius:999px;
    padding:11px 26px;cursor:pointer;
    letter-spacing:0.02em;
    box-shadow:0 8px 20px -8px rgba(201,162,39,0.5);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .ring-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px -8px rgba(201,162,39,0.65);}
  .ring-btn:active{transform:translateY(0);}
  .ring-btn:disabled{opacity:0.55;cursor:default;transform:none;}

  .notify-btn{
    display:block;margin:12px auto 0;
    font-family:'Poppins',sans-serif;
    font-weight:500;font-size:12.5px;
    color:var(--ivory);
    background:transparent;
    border:1px solid var(--border-soft);
    border-radius:999px;
    padding:9px 20px;cursor:pointer;
    letter-spacing:0.02em;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .notify-btn:hover{background:rgba(201,162,39,0.08);border-color:var(--brass);}
  .notify-btn.subscribed{
    color:var(--brass-soft);border-color:rgba(201,162,39,0.5);
    cursor:default;
  }
  .notify-btn:disabled{opacity:0.6;cursor:default;}
  .notify-note{
    text-align:center;margin-top:8px;font-size:11.5px;
    color:var(--ivory-dim);max-width:320px;margin-left:auto;margin-right:auto;
    line-height:1.5;
  }
  .notify-note a{color:var(--brass-soft);}

  /* ---------- Schedule ---------- */
  .schedule{
    display:flex;justify-content:center;gap:28px;
    margin-top:26px;padding-top:18px;
    border-top:1px solid var(--border-soft);
    flex-wrap:wrap;
  }
  .aarti{text-align:center;}
  .aarti .label{
    font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--ivory-dim);opacity:0.75;
  }
  .aarti .time{
    font-family:'JetBrains Mono',monospace;
    font-size:16px;font-weight:500;color:var(--brass-soft);
    margin-top:3px;
  }
  .countdown{
    text-align:center;margin-top:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--ivory-dim);
    letter-spacing:0.03em;
  }
  .countdown b{color:var(--ivory);font-weight:600;}

  .footer-links{
    text-align:center;margin-top:22px;font-size:12px;color:var(--ivory-dim);
  }
  .footer-links a{color:var(--brass-soft);text-decoration:none;border-bottom:1px solid rgba(228,197,103,0.35);}
  .footer-links a:hover{border-color:var(--brass-soft);}

  @media (max-width:420px){
    .arch-frame{border-radius:90px 90px 14px 14px;padding:16px 12px 20px;}
    .arch-frame::before{border-radius:82px 82px 8px 8px;}
    .player-shell{border-radius:70px 70px 6px 6px;}
    .bell.left{left:22px;} .bell.right{right:22px;}
  }
  @media (prefers-reduced-motion: reduce){
    .flame,.pill.live .dot{animation:none;}
    .bell{transition:none;}
  }
</style>
</head>
<body>
<div class="page">

  <div class="mark">
    <div class="om">ॐ Sai Ram</div>
    <h1>Shri Sai Samiti</h1>
    <p>Sector 40, Noida &nbsp;·&nbsp; Live Darshan</p>
  </div>

  <div class="arch-wrap">
    <div class="bell left" id="bellL"></div>
    <div class="bell right" id="bellR"></div>
    <div class="arch-frame">
      <div class="player-shell" id="playerShell">
        <div class="placeholder" id="placeholder">
          <div class="flame"></div>
          <p id="placeholderText">Lighting the lamp — checking whether darshan is live…</p>
        </div>
      </div>
    </div>
  </div>

  <div class="status-row">
    <span class="pill" id="statusPill"><span class="dot"></span><span id="statusText">Checking…</span></span>
  </div>

  <button class="ring-btn" id="ringBtn">Ring the bell for latest darshan</button>

  <button class="notify-btn" id="notifyBtn">🔔 Notify me when Aarti goes live</button>
  <div class="notify-note" id="notifyNote"></div>

  <div class="countdown" id="countdown"></div>

  <div class="schedule">
    <div class="aarti"><div class="label">Madhyan Aarti</div><div class="time">~12:00 PM</div></div>
    <div class="aarti"><div class="label">Dhoop Aarti</div><div class="time">~6:30 PM</div></div>
  </div>

  <div class="footer-links">
    Video powered by YouTube · Exact Aarti time varies daily · <a href="https://www.youtube.com/@saimandirnoida/live" target="_blank" rel="noopener">Open channel on YouTube</a><br>
    <a href="/privacy/">Privacy Policy</a> · <a href="/terms/">Terms of Service</a>
  </div>

</div>

<script>
/* =====================================================================
   CONFIGURATION
   =====================================================================
   The YouTube API key lives server-side now, in functions/api/darshan-status.js
   as the Cloudflare Pages environment variable YOUTUBE_API_KEY. Nothing
   secret is loaded into this page — the browser only ever talks to our
   own /api/darshan-status endpoint.
   ===================================================================== */
const CONFIG = {
  CHANNEL_HANDLE: "saimandirnoida",   // used only for the "visit channel" links below
  STATUS_ENDPOINT: "https://sai-darshan-status.deepak-prasad.workers.dev/", // <-- replace with your Worker's actual URL
  MORNING_HOUR: 12,                   // 24h local time — first aarti (12:00 noon)
  MORNING_MINUTE: 0,
  EVENING_HOUR: 18,                   // second aarti (6:30 PM)
  EVENING_MINUTE: 30,
  WINDOW_MINUTES: 75,                 // poll aggressively within ± this many minutes of each aarti
  ACTIVE_POLL_MS: 60 * 1000,          // poll every 60s inside the window (matches server cache TTL)
  IDLE_RECHECK_MS: 0                  // 0 = don't auto-poll outside the window (manual "ring the bell" only)
};

let livePollTimer = null;

const el = {
  shell: document.getElementById('playerShell'),
  placeholder: document.getElementById('placeholder'),
  placeholderText: document.getElementById('placeholderText'),
  statusPill: document.getElementById('statusPill'),
  statusText: document.getElementById('statusText'),
  ringBtn: document.getElementById('ringBtn'),
  notifyBtn: document.getElementById('notifyBtn'),
  notifyNote: document.getElementById('notifyNote'),
  countdown: document.getElementById('countdown'),
  bellL: document.getElementById('bellL'),
  bellR: document.getElementById('bellR'),
};

function showVideo(videoId){
  // Single video — used for the live stream.
  el.shell.innerHTML = `<iframe
      src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0"
      title="Shri Sai Samiti darshan"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>`;
}

function showRecentStreams(videoIds){
  // Recent completed aarti broadcasts (from the channel's "Streams" tab),
  // played back-to-back. The first video plays directly; the rest are queued
  // via YouTube's `playlist` embed parameter, which chains extra video IDs
  // after the primary one without needing an actual saved YouTube playlist.
  const [first, ...rest] = videoIds;
  const queueParam = rest.length ? `&playlist=${rest.join(',')}` : '';
  el.shell.innerHTML = `<iframe
      src="https://www.youtube.com/embed/${first}?autoplay=1&mute=1&rel=0${queueParam}"
      title="Shri Sai Samiti recent Aarti recordings"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>`;
}

function showPlaylist(playlistId){
  // Fallback only — used if the channel has no completed streams indexed yet.
  el.shell.innerHTML = `<iframe
      src="https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=1&mute=1&rel=0"
      title="Shri Sai Samiti recent darshan recordings"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>`;
}

function showPlaceholder(text){
  el.shell.innerHTML = `<div class="placeholder">
      <div class="flame"></div>
      <p>${text}</p>
    </div>`;
}

function setStatus(isLive, text){
  el.statusPill.classList.toggle('live', isLive);
  el.statusText.textContent = text;
}

/* ---------- Synthesized bell chime (no audio file needed) ---------- */
let audioCtx = null;

function playBellTone(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const now = audioCtx.currentTime;
    // A small bell's timbre is roughly a fundamental plus a few inharmonic
    // overtones, each decaying at a slightly different rate.
    const partials = [
      { freq: 880,  gain: 0.35, decay: 1.3 },
      { freq: 1480, gain: 0.18, decay: 0.9 },
      { freq: 2210, gain: 0.10, decay: 0.6 },
      { freq: 3120, gain: 0.06, decay: 0.4 },
    ];

    const master = audioCtx.createGain();
    master.gain.value = 0.5;
    master.connect(audioCtx.destination);

    partials.forEach(p => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = p.freq;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(p.gain, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + p.decay);

      osc.connect(gain);
      gain.connect(master);
      osc.start(now);
      osc.stop(now + p.decay + 0.1);
    });
  } catch(e){
    // Autoplay/audio restrictions or an unsupported browser — fail silently,
    // the visual bell animation still gives feedback either way.
    console.warn('Bell tone unavailable:', e);
  }
}

function ringBells(playSound){
  [el.bellL, el.bellR].forEach(b => b.classList.add('ring'));
  setTimeout(() => [el.bellL, el.bellR].forEach(b => b.classList.remove('ring')), 650);
  if(playSound) playBellTone();
}

async function refresh(manual){
  ringBells(manual);
  try{
    const res = await fetch(CONFIG.STATUS_ENDPOINT, { cache: 'no-store' });
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    if(data.live && data.videoId){
      showVideo(data.videoId);
      setStatus(true, "Live now");
    } else if(data.videoIds && data.videoIds.length){
      showRecentStreams(data.videoIds);
      setStatus(false, "Not live · playing recent Aarti recordings in sequence");
    } else if(data.playlistId){
      showPlaylist(data.playlistId);
      setStatus(false, "Not live · playing recent darshan in sequence");
    } else {
      showPlaceholder(`No recent darshan found yet. <a href="https://www.youtube.com/@${CONFIG.CHANNEL_HANDLE}" target="_blank" rel="noopener">Visit the channel</a>.`);
      setStatus(false, "Not live");
    }
  } catch(err){
    console.error(err);
    setStatus(false, "Couldn't check right now");
    showPlaceholder(`Something went wrong checking darshan status (${err.message}).
      <a href="https://www.youtube.com/@${CONFIG.CHANNEL_HANDLE}/live" target="_blank" rel="noopener">Try the channel directly</a>.`);
  } finally {
    if(manual){
      el.ringBtn.disabled = true;
      setTimeout(() => { el.ringBtn.disabled = false; }, 15000); // short cooldown; server cache does the real quota protection
    }
  }
}

/* ---------- Aarti countdown + smart polling window ---------- */
const AARTI_TIMES = [
  { h: CONFIG.MORNING_HOUR, m: CONFIG.MORNING_MINUTE },
  { h: CONFIG.EVENING_HOUR, m: CONFIG.EVENING_MINUTE },
];

function nextAartiInfo(){
  const now = new Date();
  const candidates = AARTI_TIMES.map(({h,m}) => {
    const d = new Date(now);
    d.setHours(h,m,0,0);
    if(d < now) d.setDate(d.getDate()+1);
    return d;
  });
  candidates.sort((a,b)=>a-b);
  return candidates[0];
}

function withinActiveWindow(){
  const now = new Date();
  return AARTI_TIMES.some(({h,m})=>{
    const target = new Date(now); target.setHours(h,m,0,0);
    return Math.abs(now - target) <= CONFIG.WINDOW_MINUTES * 60000;
  });
}

function tickCountdown(){
  const next = nextAartiInfo();
  const diff = Math.max(0, next - new Date());
  const hh = String(Math.floor(diff/3600000)).padStart(2,'0');
  const mm = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  const ss = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  el.countdown.innerHTML = `Next Aarti in <b>${hh}:${mm}:${ss}</b>`;
}

function schedulePolling(){
  clearInterval(livePollTimer);
  if(withinActiveWindow()){
    livePollTimer = setInterval(()=>refresh(false), CONFIG.ACTIVE_POLL_MS);
  } else if(CONFIG.IDLE_RECHECK_MS > 0){
    livePollTimer = setInterval(()=>refresh(false), CONFIG.IDLE_RECHECK_MS);
  }
}

el.ringBtn.addEventListener('click', () => refresh(true));

/* ---------- Push notification opt-in ---------- */
function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function isIos(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isStandalonePwa(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function setSubscribedUi(isSubscribed){
  if(isSubscribed){
    el.notifyBtn.textContent = "🔕 Turn off notifications";
    el.notifyBtn.classList.add('subscribed');
  } else {
    el.notifyBtn.textContent = "🔔 Notify me when Aarti goes live";
    el.notifyBtn.classList.remove('subscribed');
  }
  el.notifyBtn.disabled = false;
}

async function subscribeToPush(reg){
  const keyRes = await fetch(CONFIG.STATUS_ENDPOINT.replace(/\/$/, '') + '/vapid-public-key');
  const vapidPublicKey = (await keyRes.text()).trim();

  const subscription = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
  });

  await fetch(CONFIG.STATUS_ENDPOINT.replace(/\/$/, '') + '/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(subscription)
  });
}

async function unsubscribeFromPush(reg){
  const existing = await reg.pushManager.getSubscription();
  if(existing){
    await fetch(CONFIG.STATUS_ENDPOINT.replace(/\/$/, '') + '/unsubscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: existing.endpoint })
    });
    await existing.unsubscribe();
  }
}

async function initNotifyButton(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)){
    if(isIos()){
      el.notifyBtn.textContent = "🔔 Notifications need one extra step on iPhone";
      el.notifyNote.innerHTML = `On iPhone: tap the Share icon in Safari, choose <b>Add to Home Screen</b>, then open the app from your Home Screen and tap this button again.`;
    } else {
      el.notifyBtn.disabled = true;
      el.notifyBtn.textContent = "Notifications not supported in this browser";
    }
    return;
  }

  if(isIos() && !isStandalonePwa()){
    el.notifyBtn.textContent = "🔔 Notifications need one extra step on iPhone";
    el.notifyNote.innerHTML = `Tap the Share icon in Safari, choose <b>Add to Home Screen</b>, then open the app from your Home Screen and tap this button again.`;
    return;
  }

  const reg = await navigator.serviceWorker.register('service-worker.js');
  await navigator.serviceWorker.ready;

  // Reflect actual current subscription state, not just Notification.permission —
  // permission can be "granted" while the push subscription itself was cleared
  // (e.g. browser data cleared, or our server dropped an expired one).
  const existingSub = await reg.pushManager.getSubscription();
  setSubscribedUi(!!existingSub && Notification.permission === 'granted');

  el.notifyBtn.addEventListener('click', async () => {
    el.notifyBtn.disabled = true;
    const currentlySubscribed = el.notifyBtn.classList.contains('subscribed');

    try{
      if(currentlySubscribed){
        el.notifyBtn.textContent = "Turning off…";
        await unsubscribeFromPush(reg);
        setSubscribedUi(false);
        el.notifyNote.textContent = "Notifications turned off. You can turn them back on anytime.";
        return;
      }

      el.notifyBtn.textContent = "Requesting permission…";
      const permission = await Notification.requestPermission();
      if(permission !== 'granted'){
        setSubscribedUi(false);
        el.notifyNote.textContent = "Permission wasn't granted — you can try again anytime.";
        return;
      }

      await subscribeToPush(reg);
      setSubscribedUi(true);
      el.notifyNote.textContent = "You'll get a notification the moment Aarti goes live.";
    } catch(err){
      console.error(err);
      setSubscribedUi(currentlySubscribed);
      el.notifyNote.textContent = "Something went wrong: " + err.message;
    }
  });
}

initNotifyButton();

refresh(false);
schedulePolling();
setInterval(tickCountdown, 1000);
tickCountdown();
// Re-evaluate whether we've entered/left the active polling window every minute
setInterval(schedulePolling, 60000);
</script>
